<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Icono para macOS + Windows: fondo de marca #AC56A0 con degradado vertical
       sutil + campana de CRISTAL blanco (translúcida, con gloss, borde brillante
       y reflejo). Una sola fuente → icon.icns + icon.ico. -->
  <defs>
    <!-- Fondo: degradado vertical sutil del color de marca. -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#B86AAC"/>
      <stop offset="0.5" stop-color="#AC56A0"/>
      <stop offset="1"   stop-color="#974A8B"/>
    </linearGradient>
    <!-- Realce tenue de luz superior. -->
    <radialGradient id="topLight" cx="0.5" cy="0" r="0.9">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Cristal blanco: alta opacidad arriba, más translúcido al medio (deja ver
         el fondo → efecto vidrio), sólido abajo. -->
    <linearGradient id="glassFill" gradientUnits="userSpaceOnUse" x1="12" y1="2" x2="12" y2="20">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.97"/>
      <stop offset="0.5"  stop-color="#F7E6F3" stop-opacity="0.70"/>
      <stop offset="1"    stop-color="#FCEFF8" stop-opacity="0.92"/>
    </linearGradient>
    <!-- Gloss: velo claro sobre la mitad superior (brillo de vidrio). -->
    <linearGradient id="glassGloss" gradientUnits="userSpaceOnUse" x1="12" y1="2" x2="12" y2="12">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Borde de cristal brillante (blanco arriba → tinte del fondo abajo). -->
    <linearGradient id="glassRim" gradientUnits="userSpaceOnUse" x1="7" y1="2" x2="18" y2="20">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="1"   stop-color="#F0D4EA" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Sombra suave bajo la campana (valores en el espacio local del glifo). -->
    <filter id="bellShadow" x="-40%" y="-40%" width="180%" height="195%">
      <feDropShadow dx="0" dy="0.32" stdDeviation="0.42" flood-color="#5E2957" flood-opacity="0.32"/>
    </filter>
    <!-- Desenfoque suave del reflejo especular. -->
    <filter id="glossBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.16"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#topLight)"/>

  <!-- Campana de cristal, centrada, con márgenes de grilla + sombra suave. -->
  <g transform="translate(512 512) scale(0.86) translate(-512 -512) translate(26 66.5) scale(40.5)"
     filter="url(#bellShadow)">
    <!-- Interior de cristal translúcido. -->
    <path d="M6 8a6 6 0 0 1 12 0C18 15 18.92 15.61 20 16.33Q21 17 19.8 17H4.2Q3 17 4 16.33C5.08 15.61 6 15 6 8"
          fill="url(#glassFill)"/>
    <!-- Velo de brillo sobre la mitad superior. -->
    <path d="M6 8a6 6 0 0 1 12 0C18 15 18.92 15.61 20 16.33Q21 17 19.8 17H4.2Q3 17 4 16.33C5.08 15.61 6 15 6 8"
          fill="url(#glassGloss)"/>
    <!-- Borde de cristal. -->
    <path d="M6 8a6 6 0 0 1 12 0C18 15 18.92 15.61 20 16.33Q21 17 19.8 17H4.2Q3 17 4 16.33C5.08 15.61 6 15 6 8"
          fill="none" stroke="url(#glassRim)" stroke-width="1.4"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Badajo. -->
    <path d="M10.3 19a1.94 1.94 0 0 0 3.4 0"
          fill="none" stroke="url(#glassRim)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Reflejo especular: brillo fino arriba-izquierda. -->
    <path d="M8.6 6.4a5 5 0 0 1 3.9 -2.9"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="0.85"
          stroke-linecap="round" filter="url(#glossBlur)"/>
  </g>
</svg>
