<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16285A"/>
      <stop offset="55%" stop-color="#0E1D4A"/>
      <stop offset="100%" stop-color="#091640"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#2D4498" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2D4498" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#1F347C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1F347C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo + wordmark -->
  <g transform="translate(80 88)">
    <rect width="84" height="84" rx="20" fill="#0E1D4A" stroke="#A8B6F0" stroke-opacity="0.25"/>
    <g transform="translate(16 22)" fill="none" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M36 42V8a3 3 0 0 0-3-3H22a3 3 0 0 0-3 3v34"/>
      <rect width="50" height="32" x="2" y="14" rx="4"/>
      <line x1="2" y1="29" x2="52" y2="29"/>
    </g>
    <text x="110" y="56" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">LexCase</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80 230)">
    <text x="0" y="0" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">Tu bufete,</text>
    <text x="0" y="88" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="72" font-weight="700" fill="#A8B6F0" letter-spacing="-1.5">organizado al detalle.</text>
    <text x="0" y="160" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif" font-size="26" font-weight="400" fill="#D6DEFA" letter-spacing="0">Gestión de expedientes legales para Mac — local, privado y nativo.</text>
  </g>

  <!-- Chips -->
  <g transform="translate(80 530)" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif" font-size="20" font-weight="600">
    <g>
      <rect x="0" y="0" width="220" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.06" stroke="#A8B6F0" stroke-opacity="0.25"/>
      <circle cx="22" cy="22" r="5" fill="#7CE6A3"/>
      <text x="42" y="29" fill="#EEF2FF">Cero telemetría</text>
    </g>
    <g transform="translate(240 0)">
      <rect x="0" y="0" width="230" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.06" stroke="#A8B6F0" stroke-opacity="0.25"/>
      <circle cx="22" cy="22" r="5" fill="#7CE6A3"/>
      <text x="42" y="29" fill="#EEF2FF">Datos 100% locales</text>
    </g>
    <g transform="translate(490 0)">
      <rect x="0" y="0" width="240" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.06" stroke="#A8B6F0" stroke-opacity="0.25"/>
      <circle cx="22" cy="22" r="5" fill="#7CE6A3"/>
      <text x="42" y="29" fill="#EEF2FF">Diseño nativo macOS</text>
    </g>
  </g>

  <!-- Domain -->
  <text x="1120" y="600" text-anchor="end" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif" font-size="18" fill="#A8B6F0" letter-spacing="0.5">lexcase.com.do</text>
</svg>
